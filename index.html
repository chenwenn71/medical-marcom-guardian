<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cadensee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              logo: ["Baloo 2", "sans-serif"],
              display: ["Space Grotesk", "sans-serif"],
              sans: ["Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              ink: "#242422",
              muted: "#6B6E68",
              paper: "#F4F5F2",
              line: "#E6E7E2",
              leaf: { DEFAULT: "#57B23A", dark: "#489A2E", soft: "#ECF6E6" },
              risk: { DEFAULT: "#E5484D", soft: "#FCEDED" },
              caution: { DEFAULT: "#D9870F", soft: "#FBF1E0" },
            },
          },
        },
      };
    </script>
    <style>
      body { background: #EBEDE8; color: #242422; font-family: "Inter", sans-serif; }
      .font-logo { font-family: "Baloo 2", sans-serif; }
      .font-display { font-family: "Space Grotesk", sans-serif; }
      .font-mono { font-family: "JetBrains Mono", monospace; }

      @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .finding { animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both; }

      @keyframes scanSweep { 0% { top: -12%; opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { top: 104%; opacity: 0; } }
      .scanline {
        position: absolute; left: 0; right: 0; height: 92px; pointer-events: none;
        background: linear-gradient(180deg, transparent, rgba(87,178,58,.16) 45%, rgba(87,178,58,.30) 50%, rgba(87,178,58,.16) 55%, transparent);
        border-top: 1px solid rgba(87,178,58,.5); border-bottom: 1px solid rgba(87,178,58,.5);
        animation: scanSweep 1.25s cubic-bezier(.4,0,.2,1) infinite;
      }

      @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
      .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }

      .paper-grid { background-image: linear-gradient(rgba(36,36,34,.025) 1px, transparent 1px); background-size: 100% 30px; }
      *:focus-visible { outline: 2px solid #57B23A; outline-offset: 2px; border-radius: 4px; }

      @media (prefers-reduced-motion: reduce) {
        .finding, .scanline, .pulse-dot { animation: none !important; }
        .scanline { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
