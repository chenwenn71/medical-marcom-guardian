<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CadenSee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              sans: ["Inter", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              ink: "#0F1B2D",
              slatey: "#5A6B82",
              paper: "#F4F7FB",
              line: "#E3E9F0",
              teal: { 50: "#E6F6F6", 500: "#0BA5A5", 600: "#0E8C8C", 700: "#0B7472" },
              risk: { DEFAULT: "#E5484D", soft: "#FCEDED" },
              caution: { DEFAULT: "#D9870F", soft: "#FBF1E0" },
              clear: { DEFAULT: "#15A66A", soft: "#E7F6EE" },
            },
          },
        },
      };
    </script>
    <style>
      body { background: #EEF2F7; color: #0F1B2D; font-family: "Inter", sans-serif; }
      .font-display { font-family: "Space Grotesk", sans-serif; }
      .font-mono { font-family: "JetBrains Mono", monospace; }

      @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .finding { animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both; }

      @keyframes scanSweep { 0% { top: -12%; opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { top: 104%; opacity: 0; } }
      .scanline {
        position: absolute; left: 0; right: 0; height: 96px; pointer-events: none;
        background: linear-gradient(180deg, transparent, rgba(11,165,165,.18) 45%, rgba(11,165,165,.32) 50%, rgba(11,165,165,.18) 55%, transparent);
        border-top: 1px solid rgba(11,165,165,.5); border-bottom: 1px solid rgba(11,165,165,.5);
        animation: scanSweep 1.25s cubic-bezier(.4,0,.2,1) infinite;
      }

      @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
      .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }

      .paper-grid {
        background-image: linear-gradient(rgba(15,27,45,.025) 1px, transparent 1px);
        background-size: 100% 28px;
      }
      *:focus-visible { outline: 2px solid #0BA5A5; outline-offset: 2px; border-radius: 4px; }

      @media (prefers-reduced-motion: reduce) {
        .finding, .scanline, .pulse-dot { animation: none !important; }
        .scanline { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
